version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: sms
      POSTGRES_PASSWORD: securepass123
      POSTGRES_DB: school_db
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  backend:
    build: ./backend
    ports: ["3000:3000"]
    env_file: ./backend/.env
    depends_on: ["postgres"]

  frontend:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: ["backend"]

volumes:
  pgdata: